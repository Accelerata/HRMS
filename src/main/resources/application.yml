server:
  port: 8080

spring:
  application:
    name: HRMS

  # ── MySQL 数据源 ──
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/hrms?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 12345678

  # ── Redis ──
  data:
    redis:
      host: localhost
      port: 6379
      password: 12345678
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: 5000ms
      timeout: 5000ms

  # ── Jackson 序列化 ──
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# ── MyBatis ──
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.hrms.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# ── JWT ──
jwt:
  admin-secret-key: hrms-admin-secret-key-2026-prod-please-change-this
  admin-ttl: 86400000          # 24小时（毫秒）
  admin-token-name: Authorization

# ── 阿里云 OSS ──
sky:
  alioss:
    endpoint: oss-cn-hangzhou.aliyuncs.com
    access-key-id: your-access-key-id
    access-key-secret: your-access-key-secret
    bucket-name: hrms-bucket

# ── 日志 ──
logging:
  level:
    com.hrms: debug
    org.springframework.web: info